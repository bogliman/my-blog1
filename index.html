<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon site</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    header {
      background-color: yellow;
      padding: 30px;
      text-align: center;
    }

    header h1 {
      color: black;
      margin: 0;
    }

    .tabs {
      display: flex;
      justify-content: center;
      background-color: #222;
      flex-wrap: wrap;
    }

    .tab-button {
      background-color: #222;
      color: white;
      border: none;
      padding: 15px 20px;
      cursor: pointer;
      font-size: 16px;
    }

    .tab-button:hover {
      background-color: #444;
    }

    .tab-button.active {
      background-color: yellow;
      color: black;
      font-weight: bold;
    }

    .tab-content {
      display: none;
      padding: 30px;
      background-color: white;
      max-width: 1000px;
      margin: 20px auto;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .tab-content.active {
      display: block;
    }

    .viewer-box {
      width: 100%;
      height: 600px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #ddd;
      background: #e9eef2;
    }

    .viewer-box iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    p {
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <header>
    <h1>Mon site</h1>
  </header>

  <div class="tabs">
    <button class="tab-button active" onclick="openTab('introduction', this)">Introduction</button>
    <button class="tab-button" onclick="openTab('details', this)">Détails</button>
    <button class="tab-button" onclick="openTab('illustration', this)">Illustration</button>
    <button class="tab-button" onclick="openTab('infos', this)">Infos</button>
  </div>

  <div id="introduction" class="tab-content active">
    <h2>Introduction</h2>
    <p>Bienvenue sur mon site.</p>
  </div>

  <div id="details" class="tab-content">
    <h2>Détails</h2>
    <p>Ici, tu peux écrire les détails de ton site.</p>
  </div>

  <div id="illustration" class="tab-content">
    <h2>Illustration</h2>
    <p>Ci-dessous, tu peux regarder un modèle 3D de sous-marin et le faire tourner avec la souris.</p>

    <div class="viewer-box">
      <iframe
        title="Sous-marin 3D"
        frameborder="0"
        allowfullscreen
        mozallowfullscreen="true"
        webkitallowfullscreen="true"
        allow="autoplay; fullscreen; xr-spatial-tracking"
        xr-spatial-tracking
        execution-while-out-of-viewport
        execution-while-not-rendered
        web-share
        src="https://sketchfab.com/models/f1645a6ec3b54e81aed7b2c105cdd6e2/embed?autostart=1&ui_infos=0&ui_controls=1&ui_stop=0">
      </iframe>
    </div>
  </div>

  <div id="infos" class="tab-content">
    <h2>Infos</h2>
    <p>Ici, tu peux mettre des informations supplémentaires.</p>
  </div>

  <script>
    function openTab(tabId, button) {
      let contents = document.querySelectorAll('.tab-content');
      let buttons = document.querySelectorAll('.tab-button');

      contents.forEach(function(content) {
        content.classList.remove('active');
      });

      buttons.forEach(function(btn) {
        btn.classList.remove('active');
      });

      document.getElementById(tabId).classList.add('active');
      button.classList.add('active');
    }
  </script>

</body>
</html>
