<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon site</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    header {
      background-color: yellow;
      padding: 30px;
      text-align: center;
    }

    header h1 {
      color: black;
      margin: 0;
    }

    .tabs {
      display: flex;
      justify-content: center;
      background-color: #222;
      flex-wrap: wrap;
    }

    .tab-button {
      background-color: #222;
      color: white;
      border: none;
      padding: 15px 20px;
      cursor: pointer;
      font-size: 16px;
    }

    .tab-button:hover {
      background-color: #444;
    }

    .tab-button.active {
      background-color: yellow;
      color: black;
      font-weight: bold;
    }

    .tab-content {
      display: none;
      padding: 30px;
      background-color: white;
      max-width: 1000px;
      margin: 20px auto;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .tab-content.active {
      display: block;
    }

    .viewer-box {
      width: 100%;
      height: 600px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #ddd;
      background: #e9eef2;
    }
